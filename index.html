          : '0 4px 20px rgba(75,91,131,0.07)',
        transform: hovered === i ? 'translateY(-4px)' : 'none',
        transition: 'transform 0.2s ease, box-shadow 0.2s ease',
      });

      const renderCard = (m, i) => (
        <div onMouseEnter={() => setHovered(i)} onMouseLeave={() => setHovered(null)} style={cardStyle(i, false)}>
          <div style={{ display: 'flex', alignItems: 'flex-start', gap: '14px', marginBottom: '18px' }}>
            <div style={{ width: '38px', height: '38px', borderRadius: '10px', background: `linear-gradient(135deg, ${m.accent.from}, ${m.accent.to})`, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, marginTop: '2px', boxShadow: `0 4px 12px ${m.accent.from}40` }}>
              <span style={{ fontFamily: 'Manrope, sans-serif', fontSize: '13px', fontWeight: '700', color: '#fff', letterSpacing: '-0.01em' }}>{m.phase}</span>
            </div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: '4px' }}>
              <h3 style={{ fontFamily: 'Manrope, sans-serif', fontSize: '18px', fontWeight: '700', letterSpacing: '-0.02em', color: '#191c1d', margin: 0, lineHeight: '1.25' }}>{m.title}</h3>
              <span style={{ fontFamily: 'Inter, sans-serif', fontSize: '10px', fontWeight: '500', letterSpacing: '0.08em', color: '#75777f', textTransform: 'uppercase' }}>Phase {m.phase}</span>
            </div>
          </div>
          <div style={{ height: '1px', background: `linear-gradient(to right, ${m.accent.from}50, transparent)`, marginBottom: '14px' }} />
          <div style={{ display: 'flex', flexDirection: 'column', gap: '10px' }}>
            {m.deliverables.map((d, j) => (
              <div key={j} style={{ display: 'flex', alignItems: 'center', gap: '10px' }}>
                <div style={{ width: '6px', height: '6px', borderRadius: '50%', flexShrink: 0, background: m.accent.from, opacity: 1 - j * 0.2 }} />
                <div style={{ display: 'flex', flexDirection: 'column', gap: '2px' }}>
                  <span style={{ fontFamily: 'Inter, sans-serif', fontSize: '13px', fontWeight: '600', color: '#191c1d', lineHeight: '1.4' }}>{d.label}</span>
                  <span style={{ fontFamily: 'Inter, sans-serif', fontSize: '12px', fontWeight: '400', color: '#75777f', lineHeight: '1.5' }}>{d.desc}</span>
                </div>
              </div>
            ))}
          </div>
        </div>
      );

      const renderSyncCard = (m, i) => (
        <div onMouseEnter={() => setHovered(i)} onMouseLeave={() => setHovered(null)} style={cardStyle(i, true)}>
          <div style={{ display: 'flex', flexDirection: 'column', gap: '10px' }}>
            {m.deliverables.map((d, j) => (
              <div key={j} style={{ display: 'flex', alignItems: 'center', gap: '10px' }}>
                <div style={{ width: '6px', height: '6px', borderRadius: '50%', flexShrink: 0, background: m.accent.from, opacity: 1 - j * 0.2 }} />
                <div style={{ display: 'flex', flexDirection: 'column', gap: '2px' }}>
                  <span style={{ fontFamily: 'Inter, sans-serif', fontSize: '13px', fontWeight: '600', color: '#191c1d', lineHeight: '1.4' }}>{d.label}</span>
                  <span style={{ fontFamily: 'Inter, sans-serif', fontSize: '12px', fontWeight: '400', color: '#75777f', lineHeight: '1.5' }}>{d.desc}</span>
                </div>
              </div>
            ))}
          </div>
        </div>
      );

      let phaseCount = 0;

      return (
        <div style={{ width, marginTop: '80px', paddingBottom: '80px' }}>
          <div style={{ textAlign: 'center', marginBottom: '56px' }}>
            <span style={{ fontFamily: 'Inter, sans-serif', fontSize: '11px', fontWeight: '500', letterSpacing: '0.1em', color: '#75777f', textTransform: 'uppercase', display: 'block', marginBottom: '10px' }}>Milestones</span>
            <h2 style={{ fontFamily: 'Manrope, sans-serif', fontSize: '30px', fontWeight: '700', letterSpacing: '-0.02em', color: '#191c1d', lineHeight: '1.2', margin: 0 }}>建设里程碑</h2>
          </div>

          <div style={{ position: 'relative' }}>
            <div style={{ position: 'absolute', left: '50%', top: 0, bottom: 0, width: '1px', transform: 'translateX(-50%)', background: 'linear-gradient(to bottom, transparent, rgba(255,255,255,0.8) 12%, rgba(197,198,207,0.5) 50%, rgba(255,255,255,0.8) 88%, transparent)', zIndex: 0 }} />

            {MILESTONES.map((m, i) => {
              const isSync = !!m.sync;
              const isRight = isSync ? m.cardOnRight : phaseCount++ % 2 === 0;

              return (
                <div key={i} style={{ display: 'flex', alignItems: 'center', position: 'relative', marginBottom: i < MILESTONES.length - 1 ? (isSync ? '32px' : '52px') : 0 }}>
                  {/* Left half */}
                  <div style={{ flex: 1, display: 'flex', justifyContent: 'flex-end', paddingRight: '38px' }}>
                    {!isRight && (isSync ? renderSyncCard(m, i) : renderCard(m, i))}
                    {isRight && !isSync && (
                      <div style={{ textAlign: 'right' }}>
                        <div style={{ fontFamily: 'Manrope, sans-serif', fontSize: '15px', fontWeight: '700', letterSpacing: '-0.02em', color: m.accent.from, lineHeight: '1.3' }}>{m.deadline}</div>
                        <div style={{ fontFamily: 'Inter, sans-serif', fontSize: '12px', fontWeight: '400', color: '#75777f', marginTop: '4px', letterSpacing: '0.01em' }}>{m.effort}</div>
                      </div>
                    )}
                    {isRight && isSync && (
                      <div style={{ textAlign: 'right' }}>
                        <div style={{ fontFamily: 'Manrope, sans-serif', fontSize: '15px', fontWeight: '700', letterSpacing: '-0.02em', color: m.accent.from, lineHeight: '1.3' }}>{m.timeLabel}</div>
                        <div style={{ fontFamily: 'Inter, sans-serif', fontSize: '12px', fontWeight: '400', color: '#75777f', marginTop: '4px', letterSpacing: '0.01em' }}>{m.effort}</div>
                      </div>
                    )}
                  </div>

                  {/* Dot — same halo for all; sync dots slightly smaller */}
                  <div style={{ width: isSync ? '8px' : '10px', height: isSync ? '8px' : '10px', borderRadius: '50%', flexShrink: 0, background: `linear-gradient(135deg, ${m.accent.from}, ${m.accent.to})`, boxShadow: `0 0 0 3px rgba(255,255,255,0.55), 0 0 0 5px ${m.accent.from}28, 0 0 10px ${m.accent.from}60`, position: 'relative', zIndex: 1 }} />

                  {/* Right half */}
                  <div style={{ flex: 1, paddingLeft: '38px' }}>
                    {isRight && (isSync ? renderSyncCard(m, i) : renderCard(m, i))}
                    {!isRight && !isSync && (
                      <div style={{ textAlign: 'left' }}>
                        <div style={{ fontFamily: 'Manrope, sans-serif', fontSize: '15px', fontWeight: '700', letterSpacing: '-0.02em', color: m.accent.from, lineHeight: '1.3' }}>{m.deadline}</div>
                        <div style={{ fontFamily: 'Inter, sans-serif', fontSize: '12px', fontWeight: '400', color: '#75777f', marginTop: '4px', letterSpacing: '0.01em' }}>{m.effort}</div>
                      </div>
                    )}
                    {!isRight && isSync && (
                      <div style={{ textAlign: 'left' }}>
                        <div style={{ fontFamily: 'Manrope, sans-serif', fontSize: '15px', fontWeight: '700', letterSpacing: '-0.02em', color: m.accent.from, lineHeight: '1.3' }}>{m.timeLabel}</div>
                        <div style={{ fontFamily: 'Inter, sans-serif', fontSize: '12px', fontWeight: '400', color: '#75777f', marginTop: '4px', letterSpacing: '0.01em' }}>{m.effort}</div>
                      </div>
                    )}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    /* ─── Style Center shared components ─────────────────── */
    function TagChip({ name, config }) {
      if (config && config.mode === 'image' && config.imageUrl) {
        return <img src={config.imageUrl} alt={name} style={{ display: 'block', maxWidth: '120px', imageRendering: 'crisp-edges' }} onError={e => { e.target.style.display = 'none'; }} />;
      }
      return (
        <span style={{
          display: 'inline-block', padding: '2px 8px', borderRadius: '4px',
          background: config?.bg || '#E3F2FD',
          color: config?.text || '#1565C0',
          border: `1px solid ${config?.border || '#90CAF9'}`,
          fontFamily: 'Inter, sans-serif', fontSize: '12px',
          fontWeight: config?.fontWeight || '400',
          lineHeight: '20px', whiteSpace: 'nowrap',
        }}>{name}</span>
      );
    }

    function ColorField({ label, value, onChange }) {
      return (
        <div style={{ display: 'flex', flexDirection: 'column', gap: '6px' }}>
          <span style={{ fontFamily: 'Inter, sans-serif', fontSize: '11px', fontWeight: '500', color: '#75777f', letterSpacing: '0.02em' }}>{label}</span>
          <div style={{ display: 'flex', alignItems: 'center', gap: '8px', padding: '6px 10px', background: 'rgba(255,255,255,0.7)', border: '1px solid rgba(197,198,207,0.6)', borderRadius: '8px', width: '130px' }}>
            <div style={{ position: 'relative', width: '20px', height: '20px', flexShrink: 0 }}>
              <div style={{ width: '20px', height: '20px', borderRadius: '4px', background: value, border: '1px solid rgba(0,0,0,0.1)', cursor: 'pointer' }} />
              <input type="color" value={value} onChange={e => onChange(e.target.value)} style={{ position: 'absolute', inset: 0, opacity: 0, width: '100%', height: '100%', cursor: 'pointer' }} />
            </div>
            <input type="text" value={value} onChange={e => onChange(e.target.value)} style={{ fontFamily: 'Inter, sans-serif', fontSize: '12px', color: '#44464e', border: 'none', background: 'transparent', outline: 'none', width: '70px', letterSpacing: '0.02em' }} />
          </div>
        </div>
      );
    }

    const FW_OPTIONS = [
      { label: 'Regular', value: '400' },
      { label: 'Medium', value: '500' },
      { label: 'SemiBold', value: '600' },
      { label: 'Bold', value: '700' },
    ];

    const FS_OPTIONS = ['10', '11', '12', '13', '14'];

    function FontWeightField({ value, onChange }) {
      return (
        <div style={{ display: 'flex', flexDirection: 'column', gap: '6px' }}>
          <span style={{ fontFamily: 'Inter, sans-serif', fontSize: '11px', fontWeight: '500', color: '#75777f', letterSpacing: '0.02em' }}>字重</span>
          <div style={{ display: 'flex', gap: '6px', flexWrap: 'wrap' }}>
            {FW_OPTIONS.map(opt => (
              <button key={opt.value} onClick={() => onChange(opt.value)} style={{ padding: '5px 10px', borderRadius: '9999px', fontFamily: 'Inter, sans-serif', fontSize: '11px', fontWeight: opt.value, border: `1px solid ${value === opt.value ? '#4b5b83' : 'rgba(197,198,207,0.6)'}`, background: value === opt.value ? 'rgba(75,91,131,0.1)' : 'rgba(255,255,255,0.7)', color: value === opt.value ? '#4b5b83' : '#44464e', cursor: 'pointer', transition: 'all 0.15s ease', whiteSpace: 'nowrap' }}>{opt.label}</button>
            ))}
          </div>
        </div>
      );
    }

    function FontSizeField({ value, onChange }) {
      return (
        <div style={{ display: 'flex', flexDirection: 'column', gap: '6px' }}>
          <span style={{ fontFamily: 'Inter, sans-serif', fontSize: '11px', fontWeight: '500', color: '#75777f', letterSpacing: '0.02em' }}>字号</span>
          <div style={{ display: 'flex', gap: '6px' }}>
            {FS_OPTIONS.map(sz => (
              <button key={sz} onClick={() => onChange(sz)} style={{ padding: '5px 10px', borderRadius: '9999px', fontFamily: 'Inter, sans-serif', fontSize: '11px', fontWeight: '400', border: `1px solid ${value === sz ? '#4b5b83' : 'rgba(197,198,207,0.6)'}`, background: value === sz ? 'rgba(75,91,131,0.1)' : 'rgba(255,255,255,0.7)', color: value === sz ? '#4b5b83' : '#44464e', cursor: 'pointer', transition: 'all 0.15s ease', whiteSpace: 'nowrap' }}>{sz}px</button>
            ))}
          </div>
        </div>
      );
    }

    function SaveBtn({ onClick, saved }) {
      return (
        <button onClick={onClick} style={{ padding: '8px 24px', borderRadius: '9999px', background: saved ? '#22c55e' : 'linear-gradient(135deg, #4b5b83, #63749d)', color: '#fff', fontFamily: 'Inter, sans-serif', fontSize: '13px', fontWeight: '500', border: 'none', cursor: 'pointer', transition: 'all 0.25s ease', display: 'inline-flex', alignItems: 'center', gap: '6px', boxShadow: saved ? '0 4px 12px rgba(34,197,94,0.3)' : '0 4px 12px rgba(75,91,131,0.2)' }}>
          {saved ? (<><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 7L5.5 10.5L12 3" stroke="#fff" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>已保存</>) : '保存配置'}
        </button>
      );
    }

    function ModeTabs({ mode, onChange }) {
      return (
        <div style={{ display: 'flex', marginBottom: '24px', width: 'fit-content', borderRadius: '10px', overflow: 'hidden', border: '1px solid rgba(197,198,207,0.5)' }}>
          {[{ id: 'color', label: '多维色值配置' }, { id: 'image', label: '图片 URL' }].map(tab => (
            <button key={tab.id} onClick={() => onChange(tab.id)} style={{ padding: '8px 20px', fontFamily: 'Inter, sans-serif', fontSize: '12px', fontWeight: mode === tab.id ? '600' : '400', color: mode === tab.id ? '#fff' : '#75777f', background: mode === tab.id ? 'linear-gradient(135deg, #4b5b83, #63749d)' : 'rgba(255,255,255,0.8)', border: 'none', cursor: 'pointer', transition: 'all 0.2s ease' }}>{tab.label}</button>
          ))}
        </div>
      );
    }

    function ImageUrlField({ value, onChange, hint }) {
      return (
        <div style={{ display: 'flex', flexDirection: 'column', gap: '8px' }}>
          <span style={{ fontFamily: 'Inter, sans-serif', fontSize: '11px', fontWeight: '500', color: '#75777f', letterSpacing: '0.02em' }}>图片 URL</span>
          <div style={{ display: 'flex', alignItems: 'center', gap: '8px', padding: '8px 12px', background: 'rgba(255,255,255,0.8)', border: '1px solid rgba(197,198,207,0.6)', borderRadius: '8px', width: '360px' }}>
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style={{ flexShrink: 0 }}>
              <rect x="1" y="1" width="12" height="12" rx="2" stroke="#9ca3af" strokeWidth="1.2"/>
              <circle cx="4.5" cy="4.5" r="1" fill="#9ca3af"/>
              <path d="M1 9L4 6L6.5 8.5L9 6.5L13 9" stroke="#9ca3af" strokeWidth="1.2" strokeLinecap="round"/>
            </svg>
            <input type="text" placeholder="https://example.com/image.png" value={value} onChange={e => onChange(e.target.value)} style={{ flex: 1, fontFamily: 'Inter, sans-serif', fontSize: '12px', color: '#44464e', border: 'none', background: 'transparent', outline: 'none' }} />
          </div>
          {hint && <span style={{ fontFamily: 'Inter, sans-serif', fontSize: '11px', color: '#9ca3af' }}>{hint}</span>}
        </div>
      );
    }

    function ConfigPanel({ children }) {
      return (
        <div style={{ borderTop: '1px solid rgba(197,198,207,0.3)', padding: '20px 20px 24px', background: 'rgba(248,249,250,0.6)' }}>
          {children}
        </div>
      );
    }

    function PreviewBox({ children }) {
      return (
        <div style={{ display: 'flex', flexDirection: 'column', gap: '8px' }}>
          <span style={{ fontFamily: 'Inter, sans-serif', fontSize: '11px', fontWeight: '500', color: '#75777f', letterSpacing: '0.02em' }}>实时预览</span>
          <div style={{ display: 'flex', alignItems: 'center', gap: '8px', padding: '12px 16px', background: 'rgba(255,255,255,0.7)', border: '1px solid rgba(197,198,207,0.4)', borderRadius: '10px', minWidth: '160px' }}>
            {children}
          </div>
        </div>
      );
    }

    /* Tag/badge config row (color + image modes) */
    function TagConfigRow({ tag }) {
      const [expanded, setExpanded] = React.useState(false);
      const [mode, setMode] = React.useState(tag.defaultMode || 'color');
      const [cfg, setCfg] = React.useState({ bg: tag.defaultBg || '#E3F2FD', text: tag.defaultText || '#1565C0', border: tag.defaultBorder || '#90CAF9', fontWeight: '400', imageUrl: tag.defaultImageUrl || '' });
      const [saved, setSaved] = React.useState(false);
      const isImageMode = mode === 'image';
      const previewCfg = isImageMode ? { mode: 'image', imageUrl: cfg.imageUrl } : cfg;

      return (
        <div style={{ borderRadius: '12px', border: '1px solid rgba(197,198,207,0.4)', background: 'rgba(255,255,255,0.5)', overflow: 'hidden' }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: '16px', padding: '14px 20px', cursor: 'pointer', userSelect: 'none' }} onClick={() => setExpanded(e => !e)}>
            <TagChip name={tag.name} config={previewCfg} />
            <span style={{ fontFamily: 'Inter, sans-serif', fontSize: '13px', fontWeight: '500', color: '#44464e', flex: 1 }}>{tag.name}</span>
            <div style={{ display: 'flex', alignItems: 'center', gap: '6px', padding: '4px 12px', borderRadius: '9999px', background: 'rgba(75,91,131,0.07)', color: '#4b5b83', fontFamily: 'Inter, sans-serif', fontSize: '11px', fontWeight: '500' }}>
              编辑样式
              <svg width="12" height="12" viewBox="0 0 12 12" fill="none" style={{ transform: expanded ? 'rotate(180deg)' : 'rotate(0deg)', transition: 'transform 0.2s ease' }}>
                <path d="M2 4L6 8L10 4" stroke="#4b5b83" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
              </svg>
            </div>
          </div>
          {expanded && (
            <ConfigPanel>
              <ModeTabs mode={mode} onChange={setMode} />
              <div style={{ display: 'flex', gap: '40px', alignItems: 'flex-start', flexWrap: 'wrap' }}>
                <div style={{ display: 'flex', flexDirection: 'column', gap: '16px' }}>
                  {mode === 'color' ? (
                    <>
                      <div style={{ display: 'flex', gap: '16px', flexWrap: 'wrap' }}>
                        <ColorField label="背景色" value={cfg.bg} onChange={v => setCfg(c => ({ ...c, bg: v }))} />
                        <ColorField label="文字色" value={cfg.text} onChange={v => setCfg(c => ({ ...c, text: v }))} />
                        <ColorField label="边框色" value={cfg.border} onChange={v => setCfg(c => ({ ...c, border: v }))} />
                      </div>
                      <FontWeightField value={cfg.fontWeight} onChange={v => setCfg(c => ({ ...c, fontWeight: v }))} />
                    </>
                  ) : (
                    <ImageUrlField value={cfg.imageUrl} onChange={v => setCfg(c => ({ ...c, imageUrl: v }))} hint="图片将按原始尺寸 1:1 展示，建议使用 @2x 图" />
                  )}
                </div>
                <PreviewBox><TagChip name={tag.name} config={previewCfg} /></PreviewBox>
              </div>
              <div style={{ marginTop: '20px' }}>
                <SaveBtn saved={saved} onClick={() => { setSaved(true); setTimeout(() => setSaved(false), 2000); }} />
              </div>
            </ConfigPanel>
          )}
        </div>
      );
    }

    /* Text style row (font size + color + weight) */
    function TextStyleRow({ item }) {
      const [expanded, setExpanded] = React.useState(false);
      const [cfg, setCfg] = React.useState({ fontSize: item.defaultFontSize, color: item.defaultColor, fontWeight: item.defaultFontWeight });
      const [saved, setSaved] = React.useState(false);

      return (
        <div style={{ borderRadius: '12px', border: '1px solid rgba(197,198,207,0.4)', background: 'rgba(255,255,255,0.5)', overflow: 'hidden' }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: '16px', padding: '14px 20px', cursor: 'pointer', userSelect: 'none' }} onClick={() => setExpanded(e => !e)}>
            <span style={{ fontFamily: 'Inter, sans-serif', fontSize: `${cfg.fontSize}px`, fontWeight: cfg.fontWeight, color: cfg.color, flex: 1 }}>{item.preview}</span>
            <span style={{ fontFamily: 'Inter, sans-serif', fontSize: '12px', color: '#9ca3af', whiteSpace: 'nowrap' }}>{item.name}</span>
            <div style={{ display: 'flex', alignItems: 'center', gap: '6px', padding: '4px 12px', borderRadius: '9999px', background: 'rgba(75,91,131,0.07)', color: '#4b5b83', fontFamily: 'Inter, sans-serif', fontSize: '11px', fontWeight: '500' }}>
              编辑样式
              <svg width="12" height="12" viewBox="0 0 12 12" fill="none" style={{ transform: expanded ? 'rotate(180deg)' : 'rotate(0deg)', transition: 'transform 0.2s ease' }}>
                <path d="M2 4L6 8L10 4" stroke="#4b5b83" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
              </svg>
            </div>
          </div>
          {expanded && (
            <ConfigPanel>
              <div style={{ display: 'flex', gap: '40px', alignItems: 'flex-start', flexWrap: 'wrap' }}>
                <div style={{ display: 'flex', flexDirection: 'column', gap: '16px' }}>
                  <FontSizeField value={cfg.fontSize} onChange={v => setCfg(c => ({ ...c, fontSize: v }))} />
                  <div style={{ display: 'flex', gap: '16px', flexWrap: 'wrap' }}>
                    <ColorField label="文字色" value={cfg.color} onChange={v => setCfg(c => ({ ...c, color: v }))} />
                  </div>
                  <FontWeightField value={cfg.fontWeight} onChange={v => setCfg(c => ({ ...c, fontWeight: v }))} />
                </div>
                <PreviewBox>
                  <span style={{ fontFamily: 'Inter, sans-serif', fontSize: `${cfg.fontSize}px`, fontWeight: cfg.fontWeight, color: cfg.color, whiteSpace: 'nowrap' }}>{item.preview}</span>
                </PreviewBox>
              </div>
              <div style={{ marginTop: '20px' }}>
                <SaveBtn saved={saved} onClick={() => { setSaved(true); setTimeout(() => setSaved(false), 2000); }} />
              </div>
            </ConfigPanel>
          )}
        </div>
      );
    }

    /* Single text style panel (for categories with one item) */
    function TextStylePanel({ cat }) {
      const [cfg, setCfg] = React.useState({ fontSize: cat.defaultFontSize, color: cat.defaultColor, fontWeight: cat.defaultFontWeight });
      const [saved, setSaved] = React.useState(false);

      return (
        <div style={{ borderRadius: '12px', border: '1px solid rgba(197,198,207,0.4)', background: 'rgba(255,255,255,0.5)', overflow: 'hidden' }}>
          <ConfigPanel>
            <div style={{ display: 'flex', gap: '40px', alignItems: 'flex-start', flexWrap: 'wrap' }}>
              <div style={{ display: 'flex', flexDirection: 'column', gap: '16px' }}>
                <FontSizeField value={cfg.fontSize} onChange={v => setCfg(c => ({ ...c, fontSize: v }))} />
                <ColorField label="文字色" value={cfg.color} onChange={v => setCfg(c => ({ ...c, color: v }))} />
                <FontWeightField value={cfg.fontWeight} onChange={v => setCfg(c => ({ ...c, fontWeight: v }))} />
              </div>
              <PreviewBox>
                <span style={{ fontFamily: 'Inter, sans-serif', fontSize: `${cfg.fontSize}px`, fontWeight: cfg.fontWeight, color: cfg.color }}>{cat.preview}</span>
              </PreviewBox>
            </div>
            <div style={{ marginTop: '20px' }}>
              <SaveBtn saved={saved} onClick={() => { setSaved(true); setTimeout(() => setSaved(false), 2000); }} />
            </div>
          </ConfigPanel>
        </div>
      );
    }

    /* Section header */
    function SectionHeader({ title, note, count, desc }) {
      return (

                  <span style={{ fontSize: '12px' }}>{p.icon}</span>
                  <span style={{ fontFamily: 'Inter, sans-serif', fontSize: '12px', fontWeight: '500', color: '#44464e' }}>{p.label}</span>
                </div>

            </div>
          </div>

          {/* ── Demo window ── */}
          <div style={{ padding: '0 48px 64px' }}>
            {/* Frame label */}
            <div style={{ display: 'flex', alignItems: 'center', gap: '10px', marginBottom: '14px' }}>
              <div style={{ height: '1px', flex: 1, background: 'linear-gradient(to right, rgba(114,88,33,0.25), transparent)' }} />
              <span style={{ fontFamily: 'Inter, sans-serif', fontSize: '11px', fontWeight: '500', color: '#725821', letterSpacing: '0.08em', textTransform: 'uppercase', background: 'rgba(114,88,33,0.08)', padding: '4px 12px', borderRadius: '9999px', border: '1px solid rgba(114,88,33,0.15)', whiteSpace: 'nowrap' }}>后台配置界面 · 功能演示</span>
              <div style={{ height: '1px', flex: 1, background: 'linear-gradient(to left, rgba(114,88,33,0.25), transparent)' }} />
            </div>

            {/* Mock window chrome */}
            <div style={{ borderRadius: '16px', overflow: 'hidden', boxShadow: '0 24px 60px rgba(75,91,131,0.14), 0 4px 16px rgba(75,91,131,0.08)', border: '1px solid rgba(255,255,255,0.6)' }}>
              {/* Window title bar */}
              <div style={{ height: '44px', background: 'rgba(245,246,250,0.95)', backdropFilter: 'blur(20px)', WebkitBackdropFilter: 'blur(20px)', borderBottom: '1px solid rgba(197,198,207,0.35)', display: 'flex', alignItems: 'center', padding: '0 16px', gap: '12px' }}>
                <div style={{ display: 'flex', gap: '6px' }}>
                  <div style={{ width: '12px', height: '12px', borderRadius: '50%', background: '#ff5f57' }} />
                  <div style={{ width: '12px', height: '12px', borderRadius: '50%', background: '#febc2e' }} />
                  <div style={{ width: '12px', height: '12px', borderRadius: '50%', background: '#28c840' }} />
                </div>
                <div style={{ flex: 1, display: 'flex', justifyContent: 'center' }}>
                  <div style={{ padding: '4px 20px', background: 'rgba(255,255,255,0.7)', border: '1px solid rgba(197,198,207,0.4)', borderRadius: '6px', fontFamily: 'Inter, sans-serif', fontSize: '11px', color: '#9ca3af', letterSpacing: '0.02em' }}>
                    商卡中台 · 样式配置中心
                  </div>
                </div>
                <div style={{ width: '54px' }} />
              </div>

              {/* App body */}
              <div style={{ display: 'flex', background: 'rgba(248,249,252,0.98)', minHeight: '560px' }}>

                {/* Sidebar */}
                <div style={{ width: '210px', flexShrink: 0, borderRight: '1px solid rgba(197,198,207,0.3)', padding: '16px 8px', background: 'rgba(255,255,255,0.7)' }}>
                  <div style={{ padding: '4px 12px 10px', fontFamily: 'Inter, sans-serif', fontSize: '10px', fontWeight: '500', letterSpacing: '0.1em', color: '#9ca3af', textTransform: 'uppercase' }}>商卡元素</div>

                  {STYLE_CATEGORIES.map(cat => {
                    const isL1Active = l1 === cat.id;
                    const isGroupExpanded = cat.type === 'group' && expanded.has(cat.id);

                    return (
                      <div key={cat.id}>
                        <button
                          onClick={() => selectL1(cat.id)}
                          style={{ display: 'flex', alignItems: 'center', gap: '8px', padding: '9px 12px', borderRadius: '9px', background: isL1Active && cat.type !== 'group' ? 'rgba(75,91,131,0.1)' : isL1Active && cat.type === 'group' ? 'rgba(114,88,33,0.06)' : 'transparent', border: 'none', cursor: 'pointer', textAlign: 'left', width: '100%', transition: 'background 0.15s ease' }}
                          onMouseEnter={e => { if (!(isL1Active && cat.type !== 'group')) e.currentTarget.style.background = 'rgba(75,91,131,0.05)'; }}
                          onMouseLeave={e => { if (!(isL1Active && cat.type !== 'group')) e.currentTarget.style.background = isL1Active && cat.type === 'group' ? 'rgba(114,88,33,0.06)' : 'transparent'; }}
                        >
                          {isL1Active && cat.type !== 'group' && (
                            <div style={{ width: '3px', height: '16px', borderRadius: '2px', background: `linear-gradient(to bottom, ${ACCENT.from}, ${ACCENT.to})`, flexShrink: 0 }} />
                          )}
                          <span style={{ fontFamily: 'Inter, sans-serif', fontSize: '13px', fontWeight: isL1Active ? '600' : '400', color: isL1Active ? (cat.type === 'group' ? '#725821' : '#4b5b83') : '#44464e', flex: 1, paddingLeft: isL1Active && cat.type !== 'group' ? 0 : '3px', whiteSpace: 'nowrap' }}>{cat.label}</span>
                          {cat.type === 'group' ? (
                            <svg width="12" height="12" viewBox="0 0 12 12" fill="none" style={{ transform: isGroupExpanded ? 'rotate(180deg)' : 'rotate(0deg)', transition: 'transform 0.2s ease', flexShrink: 0 }}>
                              <path d="M2 4L6 8L10 4" stroke="#9ca3af" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"/>
                            </svg>
                          ) : (
                            <span style={{ fontFamily: 'Inter, sans-serif', fontSize: '10px', color: isL1Active ? '#4b5b83' : '#9ca3af', background: isL1Active ? 'rgba(75,91,131,0.12)' : 'rgba(0,0,0,0.05)', padding: '1px 6px', borderRadius: '9999px' }}>
                              {cat.type === 'tag-list' ? cat.tags.length : cat.type === 'text-style-list' ? cat.items.length : ''}
                            </span>
                          )}
                        </button>

                        {cat.type === 'group' && isGroupExpanded && (
                          <div style={{ paddingLeft: '12px', paddingBottom: '4px' }}>
                            {cat.children.map(child => {
                              const childActive = isActive(cat.id, child.id);
                              return (
                                <button
                                  key={child.id}
                                  onClick={() => selectL2(cat.id, child.id)}
                                  style={{ display: 'flex', alignItems: 'center', gap: '8px', padding: '7px 12px', borderRadius: '8px', background: childActive ? 'rgba(75,91,131,0.1)' : 'transparent', border: 'none', cursor: 'pointer', textAlign: 'left', width: '100%', transition: 'background 0.15s ease' }}
                                  onMouseEnter={e => { if (!childActive) e.currentTarget.style.background = 'rgba(75,91,131,0.05)'; }}
                                  onMouseLeave={e => { if (!childActive) e.currentTarget.style.background = 'transparent'; }}
                                >
                                  {childActive && <div style={{ width: '3px', height: '14px', borderRadius: '2px', background: `linear-gradient(to bottom, ${ACCENT.from}, ${ACCENT.to})`, flexShrink: 0 }} />}
                                  <span style={{ fontFamily: 'Inter, sans-serif', fontSize: '12px', fontWeight: childActive ? '600' : '400', color: childActive ? '#4b5b83' : '#6b7280', paddingLeft: childActive ? 0 : '11px', whiteSpace: 'nowrap', flex: 1 }}>{child.label}</span>
                                  {child.note && <span style={{ fontFamily: 'Inter, sans-serif', fontSize: '9px', color: '#9ca3af', background: 'rgba(0,0,0,0.05)', padding: '1px 5px', borderRadius: '9999px', whiteSpace: 'nowrap' }}>{child.note}</span>}
                                  <span style={{ fontFamily: 'Inter, sans-serif', fontSize: '10px', color: childActive ? '#4b5b83' : '#9ca3af', background: childActive ? 'rgba(75,91,131,0.12)' : 'rgba(0,0,0,0.05)', padding: '1px 6px', borderRadius: '9999px' }}>{child.tags.length}</span>
                                </button>
                              );
                            })}
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>

                {/* Main content */}
                <div style={{ flex: 1, minWidth: 0, padding: '24px 28px', overflowY: 'auto' }}>
                  <StyleCenterMain l1Id={l1} l2Id={l2} />
                </div>
              </div>
            </div>
          </div>

        </div>
      );
    }

    /* ─── Rule Engine components ─────────────────────────── */
    function RuleEngineSkeletonCard({ layout, selectedSlotId, onSlotClick, editMode, slotOrder, onMoveUp, onMoveDown, onRemove, onAddSlot, customSlots }) {
      const [newSlotName, setNewSlotName] = React.useState('');
      const [addingSlot, setAddingSlot] = React.useState(false);

      const slotStyle = (slotId) => ({
        borderRadius: '6px',
        background: editMode ? 'rgba(248,249,250,0.9)' : (selectedSlotId === slotId ? 'rgba(75,91,131,0.08)' : '#F0F1F2'),
        border: editMode ? '1.5px solid rgba(197,198,207,0.6)' : (selectedSlotId === slotId ? '2px solid #4b5b83' : '1.5px solid #E1E3E4'),
        cursor: editMode ? 'default' : 'pointer',
        transition: 'all 0.18s ease',
        display: 'flex', alignItems: 'center',
        fontFamily: 'Inter, sans-serif', fontSize: '11px', fontWeight: '500',
        color: selectedSlotId === slotId ? '#4b5b83' : '#9ca3af',
        letterSpacing: '0.02em',
        userSelect: 'none',
      });

      const findSlot = (id) => {
        const standard = RULE_ENGINE_SLOTS.find(s => s.id === id);
        if (standard) return standard;
        const label = customSlots?.[id];
        return label ? { id, label, candidates: [], maxCount: 1 } : null;
      };

      // Edit mode: show slot list with reorder/delete/add controls
      if (editMode && slotOrder) {
        return (
          <div style={{ width: '100%', background: '#fff', borderRadius: '12px', padding: '12px', boxShadow: '0 2px 12px rgba(0,0,0,0.06)', border: '1.5px dashed rgba(75,91,131,0.25)' }}>
            <div style={{ fontFamily: 'Inter, sans-serif', fontSize: '10px', fontWeight: '600', color: '#9ca3af', letterSpacing: '0.05em', textTransform: 'uppercase', marginBottom: '8px', display: 'flex', alignItems: 'center', gap: '5px' }}>
              <svg width="11" height="11" viewBox="0 0 12 12" fill="none"><path d="M2 4h8M2 8h8" stroke="#9ca3af" strokeWidth="1.3" strokeLinecap="round"/></svg>
              槽位排列顺序（{layout}）
            </div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: '4px' }}>
              {slotOrder.map((id, i) => {
                const s = findSlot(id);
                if (!s) return null;
                return (
                  <div key={id} style={{ display: 'flex', alignItems: 'center', gap: '6px', padding: '6px 10px', borderRadius: '7px', background: 'rgba(248,249,250,0.8)', border: '1.5px solid rgba(197,198,207,0.4)' }}>
                    <svg width="10" height="12" viewBox="0 0 8 10" fill="none" style={{ opacity: 0.35, flexShrink: 0 }}>
                      <circle cx="2" cy="2" r="1.2" fill="#44464e"/><circle cx="6" cy="2" r="1.2" fill="#44464e"/>
                      <circle cx="2" cy="5" r="1.2" fill="#44464e"/><circle cx="6" cy="5" r="1.2" fill="#44464e"/>
                      <circle cx="2" cy="8" r="1.2" fill="#44464e"/><circle cx="6" cy="8" r="1.2" fill="#44464e"/>
                    </svg>
                    <div style={{ width: '18px', height: '18px', borderRadius: '4px', background: 'rgba(197,198,207,0.4)', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                      <span style={{ fontFamily: 'Inter, sans-serif', fontSize: '9px', fontWeight: '700', color: '#75777f' }}>{i+1}</span>
                    </div>
                    <span style={{ fontFamily: 'Inter, sans-serif', fontSize: '12px', fontWeight: '500', color: '#191c1d', flex: 1 }}>{s.label}</span>
                    <code style={{ fontFamily: 'monospace', fontSize: '9px', color: '#9ca3af', background: 'rgba(197,198,207,0.2)', padding: '1px 5px', borderRadius: '3px' }}>{s.id}</code>
                    <div style={{ display: 'flex', gap: '2px', flexShrink: 0 }}>
                      <button onClick={() => onMoveUp(id)} style={{ width: '20px', height: '20px', borderRadius: '4px', border: 'none', background: i === 0 ? 'transparent' : 'rgba(197,198,207,0.3)', cursor: i === 0 ? 'default' : 'pointer', fontSize: '11px', color: '#75777f', padding: 0, display: 'flex', alignItems: 'center', justifyContent: 'center', opacity: i === 0 ? 0.25 : 1 }}>↑</button>
                      <button onClick={() => onMoveDown(id)} style={{ width: '20px', height: '20px', borderRadius: '4px', border: 'none', background: i === slotOrder.length-1 ? 'transparent' : 'rgba(197,198,207,0.3)', cursor: i === slotOrder.length-1 ? 'default' : 'pointer', fontSize: '11px', color: '#75777f', padding: 0, display: 'flex', alignItems: 'center', justifyContent: 'center', opacity: i === slotOrder.length-1 ? 0.25 : 1 }}>↓</button>
                      <button onClick={() => onRemove(id)} style={{ width: '20px', height: '20px', borderRadius: '4px', border: 'none', background: 'rgba(186,26,26,0.07)', cursor: 'pointer', fontSize: '13px', color: '#ba1a1a', padding: 0, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>×</button>
                    </div>
                  </div>
                );
              })}
            </div>
            {/* Add slot — inline name input */}
            <div style={{ marginTop: '8px' }}>
              {!addingSlot ? (
                <button onClick={() => setAddingSlot(true)}
                  style={{ width: '100%', padding: '6px', borderRadius: '7px', border: '1.5px dashed rgba(75,91,131,0.2)', background: 'transparent', fontFamily: 'Inter, sans-serif', fontSize: '11px', fontWeight: '500', color: '#75777f', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '5px' }}>
                  <svg width="11" height="11" viewBox="0 0 12 12" fill="none"><path d="M6 2v8M2 6h8" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"/></svg>
                  新增槽位行
                </button>
              ) : (
                <div style={{ display: 'flex', gap: '6px', alignItems: 'center', padding: '7px 10px', borderRadius: '8px', background: 'rgba(75,91,131,0.04)', border: '1.5px solid rgba(75,91,131,0.15)' }}>
                  <input
                    autoFocus
                    value={newSlotName}
                    onChange={e => setNewSlotName(e.target.value)}
                    onKeyDown={e => {
                      if (e.key === 'Enter' && newSlotName.trim()) { onAddSlot(newSlotName.trim()); setNewSlotName(''); setAddingSlot(false); }
                      if (e.key === 'Escape') { setNewSlotName(''); setAddingSlot(false); }
                    }}
                    placeholder="输入槽位名称，如「优惠券行」"
                    style={{ flex: 1, padding: '4px 8px', borderRadius: '5px', border: '1px solid rgba(197,198,207,0.5)', background: '#fff', fontFamily: 'Inter, sans-serif', fontSize: '11px', color: '#191c1d', outline: 'none' }}
                  />
                  <button
                    onClick={() => { if (newSlotName.trim()) { onAddSlot(newSlotName.trim()); setNewSlotName(''); setAddingSlot(false); } }}
                    disabled={!newSlotName.trim()}
                    style={{ padding: '4px 10px', borderRadius: '5px', border: 'none', background: newSlotName.trim() ? 'linear-gradient(135deg, #615b74, #4b5b83)' : 'rgba(197,198,207,0.4)', color: newSlotName.trim() ? '#fff' : '#9ca3af', fontFamily: 'Inter, sans-serif', fontSize: '11px', fontWeight: '600', cursor: newSlotName.trim() ? 'pointer' : 'not-allowed', whiteSpace: 'nowrap', flexShrink: 0 }}>
                    确认
                  </button>
                  <button onClick={() => { setNewSlotName(''); setAddingSlot(false); }}
                    style={{ width: '22px', height: '22px', borderRadius: '5px', border: 'none', background: 'rgba(197,198,207,0.25)', color: '#75777f', fontSize: '14px', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>×</button>
                </div>
              )}
            </div>
          </div>
        );
      }

      if (layout === 'horizontal') {
        return (
          <div style={{ display: 'flex', gap: '10px', background: '#fff', borderRadius: '12px', padding: '12px', boxShadow: '0 2px 12px rgba(0,0,0,0.06)', border: '1px solid #E7E8E9', width: '100%', maxWidth: '480px' }}>
            {/* Left: image area */}
            <div style={{ width: '120px', flexShrink: 0, display: 'flex', flexDirection: 'column', gap: '6px', position: 'relative' }}>
              <div style={{ ...slotStyle('activity-tag'), padding: '3px 8px', width: 'fit-content', position: 'absolute', top: 0, left: 0, zIndex: 2, fontSize: '10px' }}
                onClick={() => onSlotClick('activity-tag')}>活动标签</div>
              <div style={{ ...slotStyle('product-image'), height: '120px', width: '120px', justifyContent: 'center', flexDirection: 'column', gap: '3px' }}
                onClick={() => onSlotClick('product-image')}>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" style={{ margin: '0 auto' }}>
                  <rect x="3" y="3" width="18" height="18" rx="3" stroke="currentColor" strokeWidth="1.5"/>
                  <circle cx="8.5" cy="8.5" r="1.5" stroke="currentColor" strokeWidth="1.5"/>
                  <path d="M3 15l5-4 4 3 3-2.5 6 5" stroke="currentColor" strokeWidth="1.5" strokeLinejoin="round"/>
                </svg>
                <span style={{ display: 'block', textAlign: 'center' }}>商品图</span>
              </div>
              <div style={{ ...slotStyle('waistband'), padding: '4px 8px', justifyContent: 'center' }}
                onClick={() => onSlotClick('waistband')}>腰带</div>
            </div>
            {/* Right: content area */}
            <div style={{ flex: 1, display: 'flex', flexDirection: 'column', gap: '5px' }}>
              <div style={{ ...slotStyle('title'), padding: '6px 10px', height: '34px' }}
                onClick={() => onSlotClick('title')}>商品名称（2行）</div>
              <div style={{ ...slotStyle('product-info'), padding: '4px 10px', height: '24px' }}
                onClick={() => onSlotClick('product-info')}>商品信息（箱规·生产日期）</div>
              <div style={{ ...slotStyle('auxiliary-info'), padding: '4px 10px', height: '24px' }}
                onClick={() => onSlotClick('auxiliary-info')}>辅助信息（复购·榜单·评价）</div>
              <div style={{ ...slotStyle('tags'), padding: '4px 10px', height: '24px' }}
                onClick={() => onSlotClick('tags')}>标签行</div>
              <div style={{ ...slotStyle('selling-point'), padding: '4px 10px', height: '24px' }}
                onClick={() => onSlotClick('selling-point')}>卖点</div>
              <div style={{ display: 'flex', gap: '5px', alignItems: 'stretch' }}>
                <div style={{ ...slotStyle('price'), padding: '6px 10px', flex: 1, height: '36px', flexDirection: 'column', alignItems: 'flex-start', gap: '2px' }}
                  onClick={() => onSlotClick('price')}>
                  <span style={{ fontSize: '10px' }}>价格区</span>
                  <span style={{ fontSize: '9px', opacity: 0.7 }}>红字价·到手价·盈利</span>
                </div>
                <div style={{ ...slotStyle('add-cart'), padding: '6px 12px', borderRadius: '6px', flexShrink: 0 }}
                  onClick={() => onSlotClick('add-cart')}>加车</div>
              </div>
              <div style={{ ...slotStyle('store-info'), padding: '4px 10px', height: '24px' }}
                onClick={() => onSlotClick('store-info')}>店铺信息（名称·运费）</div>
            </div>
          </div>
        );
      }

      // Short horizontal layout
      if (layout === 'short') {
        return (
          <div style={{ display: 'flex', gap: '8px', background: '#fff', borderRadius: '10px', padding: '10px', boxShadow: '0 2px 12px rgba(0,0,0,0.06)', border: '1px solid #E7E8E9', width: '100%', maxWidth: '360px' }}>
            <div style={{ ...slotStyle('product-image'), width: '80px', height: '80px', flexShrink: 0, justifyContent: 'center', flexDirection: 'column', gap: '3px' }}
              onClick={() => onSlotClick('product-image')}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" style={{ margin: '0 auto' }}><rect x="3" y="3" width="18" height="18" rx="3" stroke="currentColor" strokeWidth="1.5"/><path d="M3 15l5-4 4 3 3-2.5 6 5" stroke="currentColor" strokeWidth="1.5" strokeLinejoin="round"/></svg>
              <span style={{ display: 'block', textAlign: 'center', fontSize: '10px' }}>商品图</span>
            </div>
            <div style={{ flex: 1, display: 'flex', flexDirection: 'column', gap: '5px' }}>
              <div style={{ ...slotStyle('title'), padding: '4px 8px' }} onClick={() => onSlotClick('title')}>商品名称</div>
              <div style={{ ...slotStyle('tags'), padding: '3px 8px', fontSize: '10px' }} onClick={() => onSlotClick('tags')}>标签行</div>
              <div style={{ display: 'flex', gap: '5px', alignItems: 'center' }}>
                <div style={{ ...slotStyle('price'), padding: '4px 8px', flex: 1 }} onClick={() => onSlotClick('price')}>价格区</div>
                <div style={{ ...slotStyle('add-cart'), padding: '4px 8px', flexShrink: 0, fontSize: '10px' }} onClick={() => onSlotClick('add-cart')}>加车</div>
              </div>
            </div>
          </div>
        );
      }

      // Mini layout
      if (layout === 'mini') {
        return (

    function SlotConfigPanel({ slot, venue, readOnly }) {
      const [candidates, setCandidates] = React.useState(() =>
        slot.candidates.map(c => ({ ...c, maxCount: c.maxCount ?? 1 }))
      );
      const [saved, setSaved] = React.useState(false);
      const [editingIdx, setEditingIdx] = React.useState(null);

      React.useEffect(() => {
        setCandidates(slot.candidates.map(c => ({ ...c, maxCount: c.maxCount ?? 1 })));
        setSaved(false);
        setEditingIdx(null);
      }, [slot.id]);

      const isInherited = venue !== 'platform';
      const venueLabel = RE_VENUES.find(v => v.id === venue)?.label || '平台通用';

      const moveUp = (i) => {
        if (i === 0) return;
        setCandidates(prev => { const a = [...prev]; [a[i-1], a[i]] = [a[i], a[i-1]]; return a; });
      };
      const moveDown = (i) => {
        setCandidates(prev => { if (i >= prev.length - 1) return prev; const a = [...prev]; [a[i], a[i+1]] = [a[i+1], a[i]]; return a; });
      };
      const deleteCandidate = (i) => {
        setCandidates(prev => prev.filter((_, idx) => idx !== i));
        if (editingIdx === i) setEditingIdx(null);
      };
      const addCandidate = () => {
        setCandidates(prev => [...prev, { field: '', condition: '', remark: '', maxCount: 1 }]);
        setEditingIdx(candidates.length);
      };
      const updateField = (i, key, val) => {
        setCandidates(prev => prev.map((c, idx) => idx === i ? { ...c, [key]: val } : c));
      };

      return (
        <div style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
          {/* Header */}
          <div style={{ padding: '14px 16px 10px', borderBottom: '1px solid rgba(197,198,207,0.3)' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: '8px', marginBottom: isInherited ? '8px' : '0' }}>
              <span style={{ fontFamily: 'Manrope, sans-serif', fontSize: '13px', fontWeight: '700', color: '#191c1d' }}>{slot.label}</span>
              <span style={{ fontSize: '10px', fontFamily: 'Inter, sans-serif', color: '#75777f', background: 'rgba(197,198,207,0.3)', padding: '1px 7px', borderRadius: '9999px' }}>{slot.id}</span>
            </div>
            {isInherited && (
              <div style={{ display: 'flex', alignItems: 'center', gap: '6px', padding: '5px 10px', background: 'rgba(75,91,131,0.06)', borderRadius: '6px', border: '1px solid rgba(75,91,131,0.12)' }}>
                <svg width="11" height="11" viewBox="0 0 12 12" fill="none"><path d="M2 2v4a2 2 0 002 2h4M6 6l2 2-2 2" stroke="#615b74" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"/></svg>

          {/* Candidates list */}
          <div style={{ flex: 1, overflowY: 'auto', padding: '0 12px 8px' }}>
            {candidates.map((c, i) => {
              const isEditing = editingIdx === i;
              return (

                    {/* Priority badge */}
                    <div style={{ width: '17px', height: '17px', borderRadius: '4px', background: i === 0 ? 'linear-gradient(135deg, #615b74, #4b5b83)' : 'rgba(197,198,207,0.5)', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                      <span style={{ fontFamily: 'Inter, sans-serif', fontSize: '9px', fontWeight: '700', color: i === 0 ? '#fff' : '#75777f' }}>{i + 1}</span>

                    {/* Per-field max count */}
                    <div style={{ display: 'flex', alignItems: 'center', gap: '2px', flexShrink: 0 }}

                      <button onClick={() => !readOnly && updateField(i, 'maxCount', Math.max(1, (c.maxCount||1) - 1))}
                        style={{ width: '16px', height: '16px', borderRadius: '3px', border: '1px solid rgba(197,198,207,0.5)', background: 'rgba(255,255,255,0.8)', cursor: readOnly ? 'not-allowed' : 'pointer', fontSize: '11px', color: '#44464e', lineHeight: '1', padding: 0, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>−</button>

                      <button onClick={() => !readOnly && updateField(i, 'maxCount', Math.min(10, (c.maxCount||1) + 1))}
                        style={{ width: '16px', height: '16px', borderRadius: '3px', border: '1px solid rgba(197,198,207,0.5)', background: 'rgba(255,255,255,0.8)', cursor: readOnly ? 'not-allowed' : 'pointer', fontSize: '11px', color: '#44464e', lineHeight: '1', padding: 0, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>+</button>
                    </div>
                    {/* Reorder + delete */}
                    {!readOnly && (
                      <div style={{ display: 'flex', gap: '2px', flexShrink: 0 }} onClick={e => e.stopPropagation()}>
                        <button onClick={() => moveUp(i)} style={{ width: '18px', height: '18px', borderRadius: '4px', border: 'none', background: i === 0 ? 'transparent' : 'rgba(197,198,207,0.3)', cursor: i === 0 ? 'default' : 'pointer', fontSize: '10px', color: '#75777f', padding: 0, display: 'flex', alignItems: 'center', justifyContent: 'center', opacity: i === 0 ? 0.3 : 1 }}>↑</button>
                        <button onClick={() => moveDown(i)} style={{ width: '18px', height: '18px', borderRadius: '4px', border: 'none', background: i === candidates.length-1 ? 'transparent' : 'rgba(197,198,207,0.3)', cursor: i === candidates.length-1 ? 'default' : 'pointer', fontSize: '10px', color: '#75777f', padding: 0, display: 'flex', alignItems: 'center', justifyContent: 'center', opacity: i === candidates.length-1 ? 0.3 : 1 }}>↓</button>
                        <button onClick={() => deleteCandidate(i)} style={{ width: '18px', height: '18px', borderRadius: '4px', border: 'none', background: 'rgba(186,26,26,0.08)', cursor: 'pointer', fontSize: '12px', color: '#ba1a1a', padding: 0, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>×</button>
                      </div>
                    )}
                  </div>
                  {/* Expanded edit form */}
                  {isEditing && !readOnly && (
                    <div style={{ padding: '8px 10px', borderTop: '1px solid rgba(75,91,131,0.1)', display: 'flex', flexDirection: 'column', gap: '6px' }}>
                      <div>
                        <div style={{ fontFamily: 'Inter, sans-serif', fontSize: '10px', color: '#75777f', marginBottom: '3px' }}>字段名</div>
                        <input value={c.field} onChange={e => updateField(i, 'field', e.target.value)}
                          placeholder="如 effective_price"
                          style={{ width: '100%', padding: '5px 8px', borderRadius: '5px', border: '1px solid rgba(197,198,207,0.5)', background: '#fff', fontFamily: 'monospace', fontSize: '11px', color: '#4b5b83', outline: 'none', boxSizing: 'border-box' }} />
                      </div>
                      <div>
                        <div style={{ fontFamily: 'Inter, sans-serif', fontSize: '10px', color: '#75777f', marginBottom: '3px' }}>触发条件</div>
                        <input value={c.condition || ''} onChange={e => updateField(i, 'condition', e.target.value)}
                          placeholder="如 price != null"
                          style={{ width: '100%', padding: '5px 8px', borderRadius: '5px', border: '1px solid rgba(197,198,207,0.5)', background: '#fff', fontFamily: 'monospace', fontSize: '11px', color: '#725821', outline: 'none', boxSizing: 'border-box' }} />
                      </div>
                      <div>
                        <div style={{ fontFamily: 'Inter, sans-serif', fontSize: '10px', color: '#75777f', marginBottom: '3px' }}>备注说明</div>
                        <input value={c.remark || ''} onChange={e => updateField(i, 'remark', e.target.value)}
                          placeholder="字段用途说明..."
                          style={{ width: '100%', padding: '5px 8px', borderRadius: '5px', border: '1px solid rgba(197,198,207,0.5)', background: '#fff', fontFamily: 'Inter, sans-serif', fontSize: '11px', color: '#44464e', outline: 'none', boxSizing: 'border-box' }} />
                      </div>
                    </div>
                  )}
                  {/* Collapsed view: show condition + remark */}
                  {!isEditing && (c.remark || c.condition) && (
                    <div style={{ padding: '0 10px 7px', display: 'flex', flexWrap: 'wrap', gap: '4px' }}>
                      {c.condition && c.condition !== 'always' && (
                        <span style={{ fontFamily: 'monospace', fontSize: '9px', color: '#725821', background: 'rgba(114,88,33,0.08)', padding: '1px 5px', borderRadius: '3px', border: '1px solid rgba(114,88,33,0.12)' }}>if {c.condition}</span>
                      )}
                      {c.remark && <span style={{ fontFamily: 'Inter, sans-serif', fontSize: '10px', color: '#9ca3af', lineHeight: '1.4' }}>{c.remark}</span>}
                    </div>
                  )}
                </div>
              );
            })}

            {/* Add field button */}
            {!readOnly && (
              <button onClick={addCandidate}
                style={{ width: '100%', padding: '6px', borderRadius: '7px', border: '1.5px dashed rgba(75,91,131,0.2)', background: 'transparent', fontFamily: 'Inter, sans-serif', fontSize: '11px', fontWeight: '500', color: '#75777f', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '5px', marginTop: '2px' }}>
                <svg width="11" height="11" viewBox="0 0 12 12" fill="none"><path d="M6 2v8M2 6h8" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"/></svg>
                绑定字段
              </button>
            )}
          </div>

          {/* Save button or read-only banner */}
          {readOnly ? (
            <div style={{ padding: '10px 16px', borderTop: '1px solid rgba(197,198,207,0.25)', display: 'flex', alignItems: 'center', gap: '6px', background: 'rgba(197,198,207,0.1)' }}>
              <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><rect x="3" y="6" width="8" height="6" rx="1.5" stroke="#9ca3af" strokeWidth="1.3"/><path d="M5 6V4.5a2 2 0 014 0V6" stroke="#9ca3af" strokeWidth="1.3" strokeLinecap="round"/></svg>
              <span style={{ fontFamily: 'Inter, sans-serif', fontSize: '11px', color: '#9ca3af' }}>只读模式 · 按产品线查询不支持编辑</span>

          ) : (
            <div style={{ padding: '10px 14px', borderTop: '1px solid rgba(197,198,207,0.25)' }}>
              <button
                onClick={() => { setSaved(true); setTimeout(() => setSaved(false), 2000); }}
                style={{ width: '100%', padding: '8px', borderRadius: '8px', background: saved ? 'rgba(34,197,94,0.12)' : 'linear-gradient(135deg, #615b74, #4b5b83)', border: saved ? '1px solid rgba(34,197,94,0.3)' : 'none', color: saved ? '#15803d' : '#fff', fontFamily: 'Inter, sans-serif', fontSize: '12px', fontWeight: '600', cursor: 'pointer', transition: 'all 0.2s ease' }}
              >{saved ? '✓ 已保存' : '保存配置'}</button>
            </div>
          )}
        </div>
      );
    }

      const [pending, setPending] = React.useState(new Set(bindings));

      const toggle = (posId) => {
        setPending(prev => {
          const next = new Set(prev);
          next.has(posId) ? next.delete(posId) : next.add(posId);
          return next;
        });
      };

      return (
        <div style={{ position: 'fixed', inset: 0, zIndex: 200, display: 'flex', alignItems: 'center', justifyContent: 'center' }}
          onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
          <div style={{ position: 'absolute', inset: 0, background: 'rgba(25,28,29,0.35)', backdropFilter: 'blur(4px)', WebkitBackdropFilter: 'blur(4px)' }} />
          <div style={{ position: 'relative', width: '380px', background: 'rgba(255,255,255,0.96)', backdropFilter: 'blur(20px)', WebkitBackdropFilter: 'blur(20px)', borderRadius: '16px', boxShadow: '0 24px 60px rgba(75,91,131,0.18), 0 4px 16px rgba(75,91,131,0.1)', border: '1px solid rgba(255,255,255,0.7)', overflow: 'hidden' }}>

                      const checked = pending.has(pos.id);

                        <label key={pos.id} style={{ display: 'flex', alignItems: 'center', gap: '10px', padding: '8px 10px', borderRadius: '8px', cursor: 'pointer', background: checked ? 'rgba(75,91,131,0.06)' : 'transparent', border: `1px solid ${checked ? 'rgba(75,91,131,0.15)' : 'transparent'}`, transition: 'all 0.15s ease' }}>
                          <div style={{ width: '18px', height: '18px', borderRadius: '5px', border: `2px solid ${checked ? '#4b5b83' : '#c5c6cf'}`, background: checked ? '#4b5b83' : 'transparent', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, transition: 'all 0.15s ease' }}
                            onClick={() => toggle(pos.id)}>
                            {checked && <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 5l2.5 2.5L8 3" stroke="#fff" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/></svg>}
                          </div>
                          <span style={{ fontFamily: 'Inter, sans-serif', fontSize: '13px', fontWeight: checked ? '500' : '400', color: checked ? '#191c1d' : '#44464e', userSelect: 'none' }} onClick={() => toggle(pos.id)}>{pos.label}</span>
                        </label>
                      );
                    })}
                  </div>
                </div>
              ))}

            {/* Footer */}

                style={{ padding: '8px 18px', borderRadius: '8px', border: '1px solid rgba(197,198,207,0.5)', background: 'transparent', fontFamily: 'Inter, sans-serif', fontSize: '13px', fontWeight: '500', color: '#75777f', cursor: 'pointer' }}>

    function NewTemplateOverlay({ existingTemplates, onAdd, onClose }) {
      const [selectedVenueId, setSelectedVenueId] = React.useState('');
      const [tplName, setTplName] = React.useState('');

      const existingVenueIds = new Set(existingTemplates.map(t => t.venueId));

      // Build select options grouped by top-level venue
      const topVenues = RE_VENUES.filter(v => v.level === 1);
      const buildOptions = () => {
        const opts = [];
        topVenues.forEach(tv => {
          const tvDisabled = existingVenueIds.has(tv.id);
          opts.push({ id: tv.id, label: tv.label, disabled: tvDisabled, indent: false });
          if (tv.hasIndustry) {
            RE_VENUES.filter(v => v.parent === tv.id).forEach(ind => {
              const indDisabled = existingVenueIds.has(ind.id);
              opts.push({ id: ind.id, label: `　${ind.label}（行业）`, disabled: indDisabled, indent: true });
            });
          }
        });
        return opts;
      };
      const options = buildOptions();

      const selectedVenue = RE_VENUES.find(v => v.id === selectedVenueId);
      const canCreate = selectedVenueId && tplName.trim();

      const handleAdd = () => {
        if (!canCreate) return;
        onAdd({
          id: `tpl-custom-${Date.now()}`,
          label: tplName.trim(),
          venueId: selectedVenueId,
          desc: `${selectedVenue?.label || ''} 自定义模板`,
        });
        onClose();
      };

                              const isStringVal = line.includes('": "');
                              const isNumVal = /": \d/.test(line);
                              const isBrace = /^[\s]*[{}\[\],]/.test(line) && !/": /.test(line);
                              let color = '#93c5fd';
                              if (isBrace) color = 'rgba(255,255,255,0.3)';
                              else if (isStringVal) color = '#86efac';
                              else if (isNumVal) color = '#fbbf24';
                              return <span key={i} style={{ display: 'block', color }}>{line}</span>;
                            })}
                          </pre>
                        </div>
                      )}
                    </div>

                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    /* ─── Placeholder Page ────────────────────────────────── */
    function PlaceholderPage({ layer, onBack }) {
      return (
        <div style={{ minHeight: '100vh', background: 'linear-gradient(140deg, #e4eaf5 0%, #ece8f6 35%, #f3f1fa 60%, #f8f9fa 100%)', display: 'flex', flexDirection: 'column' }}>
          <div style={{ position: 'sticky', top: 0, zIndex: 100, padding: '0 40px', height: '64px', display: 'flex', alignItems: 'center', gap: '16px', background: 'rgba(255,255,255,0.72)', backdropFilter: 'blur(20px)', WebkitBackdropFilter: 'blur(20px)', borderBottom: '1px solid rgba(255,255,255,0.5)' }}>
            <button onClick={onBack} style={{ display: 'flex', alignItems: 'center', gap: '6px', padding: '7px 14px', borderRadius: '9999px', background: 'rgba(75,91,131,0.08)', border: '1px solid rgba(75,91,131,0.15)', color: '#4b5b83', fontFamily: 'Inter, sans-serif', fontSize: '13px', fontWeight: '500', cursor: 'pointer' }}>
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 3L5 8L10 13" stroke="#4b5b83" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>
              返回
            </button>
            <div style={{ width: '1px', height: '20px', background: 'rgba(197,198,207,0.6)' }} />
            <div style={{ width: '28px', height: '28px', borderRadius: '8px', background: `linear-gradient(135deg, ${layer.accent.from}, ${layer.accent.to})`, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              <span style={{ fontFamily: 'Manrope, sans-serif', fontSize: '10px', fontWeight: '700', color: '#fff' }}>{layer.num}</span>
            </div>
            <h1 style={{ fontFamily: 'Manrope, sans-serif', fontSize: '17px', fontWeight: '700', letterSpacing: '-0.02em', color: '#191c1d', margin: 0 }}>{layer.title}</h1>
          </div>
          <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', flexDirection: 'column', gap: '16px' }}>
            <div style={{ width: '64px', height: '64px', borderRadius: '18px', background: `linear-gradient(135deg, ${layer.accent.from}, ${layer.accent.to})`, display: 'flex', alignItems: 'center', justifyContent: 'center', boxShadow: `0 8px 24px ${layer.accent.from}40` }}>
              <span style={{ fontFamily: 'Manrope, sans-serif', fontSize: '22px', fontWeight: '700', color: '#fff' }}>{layer.num}</span>
            </div>
            <h2 style={{ fontFamily: 'Manrope, sans-serif', fontSize: '24px', fontWeight: '700', letterSpacing: '-0.02em', color: '#191c1d', margin: 0 }}>{layer.title}</h2>
            <p style={{ fontFamily: 'Inter, sans-serif', fontSize: '14px', color: '#75777f', margin: 0 }}>详细功能页面建设中</p>
          </div>
        </div>
      );
    }

    /* ─── App ─────────────────────────────────────────────── */
    function App() {
      const [page, setPage] = React.useState('home');
      const [visible, setVisible] = React.useState(true);
      const cardRefs = React.useRef([]);
      const [cardWidth, setCardWidth] = React.useState(null);
      const bottomRowRef = React.useRef(null);
      const [bottomWidth, setBottomWidth] = React.useState(null);

      React.useLayoutEffect(() => {
        if (page !== 'home') return;
        const widths = cardRefs.current.map(el => el ? el.getBoundingClientRect().width : 0);
        const max = Math.max(...widths);
        if (max > 0) setCardWidth(max);
      }, [page]);

      React.useLayoutEffect(() => {
        if (page !== 'home') return;
        if (cardWidth && bottomRowRef.current) setBottomWidth(bottomRowRef.current.getBoundingClientRect().width);
      }, [cardWidth, page]);

      function navigateTo(route) {
        setVisible(false);
        setTimeout(() => { setPage(route); setVisible(true); }, 260);
      }
      function goHome() {
        setVisible(false);
        setTimeout(() => { setPage('home'); setVisible(true); }, 260);
      }

      const ts = { opacity: visible ? 1 : 0, transform: visible ? 'translateY(0)' : 'translateY(12px)', transition: 'opacity 0.26s ease, transform 0.26s ease' };

      if (page === 'data-service') return <div style={ts}><DataServicePage onBack={goHome} /></div>;
      if (page === 'style-center') return <div style={ts}><StyleCenterPage onBack={goHome} /></div>;
      if (page === 'rule-engine') return <div style={ts}><RuleEnginePage onBack={goHome} /></div>;
      if (page === 'card-protocol') return <div style={ts}><CardProtocolPage onBack={goHome} /></div>;

      const currentLayer = LAYERS.find(l => l.route === page);
      if (currentLayer) return <div style={ts}><PlaceholderPage layer={currentLayer} onBack={goHome} /></div>;

      return (
        <div style={{ ...ts, minHeight: '100vh', background: 'linear-gradient(140deg, #e4eaf5 0%, #ece8f6 35%, #f3f1fa 60%, #f8f9fa 100%)', display: 'flex', flexDirection: 'column', alignItems: 'center', padding: '60px 32px' }}>
          {bottomWidth && (
            <div style={{ width: `${bottomWidth}px`, marginBottom: '48px' }}>
              <div style={{ display: 'flex', gap: '20px' }}>
                {WIDE_CARDS.map((card, i) => <WideCard key={i} card={card} />)}
              </div>
            </div>
          )}
          <div style={{ textAlign: 'center', marginBottom: '36px' }}>
            <span style={{ fontFamily: 'Inter, sans-serif', fontSize: '11px', fontWeight: '500', letterSpacing: '0.1em', color: '#75777f', textTransform: 'uppercase', display: 'block', marginBottom: '10px' }}>Product Architecture</span>
            <h1 style={{ fontFamily: 'Manrope, sans-serif', fontSize: '30px', fontWeight: '700', letterSpacing: '-0.02em', color: '#191c1d', lineHeight: '1.2', margin: 0 }}>统一商卡架构</h1>
            <p style={{ fontFamily: 'Inter, sans-serif', fontSize: '14px', color: '#44464e', margin: '10px 0 0', lineHeight: '1.6' }}>四层结构，端到端统一商卡渲染流水线（点击下方卡片标题浏览详情）</p>
          </div>
          <div ref={bottomRowRef} style={{ display: 'flex', alignItems: 'flex-start', gap: '12px', flexWrap: 'nowrap' }}>
            {LAYERS.map((layer, i) => (
              <React.Fragment key={i}>
                <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: '12px' }}>
                  <Card layer={layer} width={cardWidth} ref={el => cardRefs.current[i] = el} onTitleClick={navigateTo} />
                  <StatusBadge status={layer.status} />
                </div>
                {i < LAYERS.length - 1 && <Arrow />}
              </React.Fragment>
            ))}
          </div>
          {bottomWidth && <MilestonesSection width={bottomWidth} />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
